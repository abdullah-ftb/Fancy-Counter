apiVersion: apps/v1
kind: Deployment
metadata:
  name: fancy-counter
  labels:
    app: fancy-counter
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fancy-counter
  template:
    metadata:
      labels:
        app: fancy-counter
    spec:
      containers:
      - name: fancy-counter
        image: nginx:alpine # Replace this later with your Docker Hub/GitHub image
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: fancy-counter-service
spec:
  selector:
    app: fancy-counter
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: NodePort
